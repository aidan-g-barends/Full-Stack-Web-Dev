<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>CSS Flag Project</title>
  <style>
    /* Write your CSS Code here */
   .flag{
    background: red;
    height:600px;
    width:900px;
    position:relative;
   }

   .flag p{
    color:white;
    text-align:center;
   }

   .flag > div{
    background-color: blue;
    width:100%;
    height:30 0px;
    position:absolute;
    top:150px;
   }

   .flag > div > div{
    background-color: white;
    height:200px;
    width:200px;
    position:absolute;
    border-radius:50%;
    left:350px;
    top:50px;
   }

    p {
      font-size: 5rem;
      color: white;
      text-align: center;
      padding: 0;
      margin: 0;
    }

    .flag > div div p{
      color:black;
    }

   
  </style>
</head>

<!-- 
Hint 1: The flag is 900px by 600px and the circle is 200px by 200px.
Hint 2: You can use CSS inspection to get the colors from
https://appbrewery.github.io/flag-of-laos/
-->

<body>
  <div class="flag">
    <p>The Flag</p>
    <div>
      <div>
        <p>of Laos</p>
      </div>
    </div>
  </div>
</body>

</html>
